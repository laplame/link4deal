# Incluido dentro de http { } (sites-available). Upstream DEBE coincidir con ecosystem.config.cjs apps[0].env.PORT (PM2).
# Despliegue: solo copiar ESTE archivo (no depende de snippets).
#   sudo cp nginx.conf /etc/nginx/sites-available/damecodigo.com && sudo nginx -t && sudo systemctl reload nginx
#
# TLS link4deal (standalone, etc.): ver bloque comentado al final.

upstream link4deal_node {
    server 127.0.0.1:5001;
    keepalive 32;
}

server {
    listen 80;
    server_name damecodigo.com www.damecodigo.com;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name link4deal.com www.link4deal.com;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name damecodigo.com www.damecodigo.com;

    ssl_certificate     /etc/letsencrypt/live/damecodigo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damecodigo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ^~ y ANTES de location /: evita que otra regex o try_files capture /api o /uploads.
    location ^~ /api/ {
        client_max_body_size 60m;
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        # CORS: NO añadir Access-Control-Allow-* aquí. Express ya envía ACAO mirroring el Origin y
        # valores duplicados (p. ej. * + Origin) rompen fetch en apex vs www — ver NGINX_DAMECODIGO_CONF.md.
    }

    location ^~ /uploads/ {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets con hash (evitar anidar location / → bucles 500 con rutas SPA /admin/...).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|webmanifest)$ {
        root /home/cto/project/link4deal/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Rutas SPA que coinciden con carpetas en dist/ (p. ej. antiguo dist/faq/) → siempre index.html.
    location = /faq {
        root /home/cto/project/link4deal/dist;
        try_files /index.html =404;
    }
    location = /faq/ {
        root /home/cto/project/link4deal/dist;
        try_files /index.html =404;
    }

    # Imágenes FAQ (public/images/faq → /images/faq/*.png)
    location ^~ /images/faq/ {
        root /home/cto/project/link4deal/dist;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SEO: sitemap y robots dinámicos (Express)
    location = /sitemap.xml {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /robots.txt {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prerender HTML híbrido (contenido indexable + bundle SPA) — Express
    location = /marketplace {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /influencer {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /promo/ {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /promociones/ {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Head-only SSR por página dinámica: Express inyecta <head> y sirve el shell SPA.
    # Regex de un solo segmento: NO captura subrutas (/influencer/:slug/edit, etc.).
    location ~ ^/promotion-details/[^/]+/?$ {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/influencer/[^/]+/?$ {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/brand/[^/]+/?$ {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/category/[^/]+/?$ {
        proxy_pass http://link4deal_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA (React Router): sin $uri/ para no tratar carpetas en disco como directorio (403).
    location / {
        root /home/cto/project/link4deal/dist;
        index index.html;
        try_files $uri /index.html;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        # * no incluye blob:; las previews locales (createObjectURL) necesitan blob: explícito
        add_header Content-Security-Policy "default-src * data: blob: 'unsafe-eval' 'unsafe-inline'" always;
    }

    # NO usar error_page 404 /index.html junto con try_files /index.html (bucle → 500).
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /home/cto/project/link4deal/dist;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/rss+xml
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        image/x-icon
        text/x-component;
}

# HTTPS link4deal: descomenta cuando exista /etc/letsencrypt/live/link4deal.com/
