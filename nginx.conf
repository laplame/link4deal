# Incluido dentro de http { } (sites-available). Backend = PM2 (PORT=5001).
# Copiar: nginx.conf -> /etc/nginx/sites-available/damecodigo.com
# Copiar: nginx/snippets/link4deal-app.conf -> /etc/nginx/snippets/link4deal-app.conf
#
# === TLS ===
# Opción A (un solo cert, SAN): si HTTP /.well-known sirve bien para AMBOS dominios:
#   sudo certbot certonly --webroot -w /var/www/html --cert-name damecodigo.com --expand \
#     -d damecodigo.com -d www.damecodigo.com -d link4deal.com -d www.link4deal.com
#   Luego puedes fusionar en UN solo bloque 443 (comentario al final de este archivo).
#
# Opción B (recomendada si link4deal devuelve HTML del SPA en el challenge): cert solo para link4deal
# con Nginx parado unos segundos:
#   sudo systemctl stop nginx
#   sudo certbot certonly --standalone -d link4deal.com -d www.link4deal.com
#   sudo systemctl start nginx
#   sudo cp nginx.conf ... && sudo nginx -t && sudo systemctl reload nginx
#
# Si certbot devuelve HTML en http://link4deal.com/.well-known/... hay OTRO server :80 o merge
# con ese host:  grep -rn link4deal /etc/nginx/sites-enabled/
#
upstream link4deal_node {
    server 127.0.0.1:5001;
    keepalive 32;
}

server {
    listen 80;
    server_name damecodigo.com www.damecodigo.com;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name link4deal.com www.link4deal.com;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name damecodigo.com www.damecodigo.com;

    ssl_certificate     /etc/letsencrypt/live/damecodigo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damecodigo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/link4deal-app.conf;
}

# Cert en /etc/letsencrypt/live/link4deal.com/ (p. ej. certbot --standalone).
# Comenta este server { } hasta tener el primer cert: sudo nginx -t debe pasar.
server {
    listen 443 ssl;
    server_name link4deal.com www.link4deal.com;

    ssl_certificate     /etc/letsencrypt/live/link4deal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/link4deal.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/link4deal-app.conf;
}
