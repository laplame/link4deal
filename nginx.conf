# Incluido dentro de http { } (sites-available). Backend = PM2 (ecosystem.config.cjs PORT=5001).
#
# Dominios: damecodigo.com y link4deal.com (misma app, un único bloque HTTPS).
# Copiar: nginx.conf -> /etc/nginx/sites-available/damecodigo.com
# Copiar: nginx/snippets/link4deal-app.conf -> /etc/nginx/snippets/link4deal-app.conf
#
# Certificado para LOS CUATRO nombres (recomendado: ampliar el certificado existente):
#   sudo mkdir -p /var/www/html/.well-known/acme-challenge
#   sudo certbot certonly --webroot -w /var/www/html \
#     --cert-name damecodigo.com --expand \
#     -d damecodigo.com -d www.damecodigo.com -d link4deal.com -d www.link4deal.com
# El cert queda en /etc/letsencrypt/live/damecodigo.com/ y sirve para ambos dominios (SAN).
#
# Si --expand falla en link4deal.com: otro vhost en sites-enabled sirve ese host en :80
# con el SPA (sin ACME). Revisa: grep -r link4deal /etc/nginx/sites-enabled/

upstream link4deal_node {
    server 127.0.0.1:5001;
    keepalive 32;
}

server {
    listen 80;
    server_name damecodigo.com www.damecodigo.com;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name link4deal.com www.link4deal.com;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name damecodigo.com www.damecodigo.com link4deal.com www.link4deal.com;

    ssl_certificate     /etc/letsencrypt/live/damecodigo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damecodigo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/link4deal-app.conf;
}
