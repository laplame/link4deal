# Incluido dentro de http { } (sites-available). Backend = PM2 (ecosystem.config.cjs PORT=5001).
#
# Dominios: damecodigo.com y link4deal.com (misma app, certificados TLS por dominio).
# Copiar: nginx.conf -> /etc/nginx/sites-available/damecodigo.com (o el enlace en sites-enabled)
# Copiar: nginx/snippets/link4deal-app.conf -> /etc/nginx/snippets/link4deal-app.conf
#
# Certificado link4deal.com (HTTP-01; exige que este archivo sea el ÚNICO server :80 para esos hosts):
#   sudo mkdir -p /var/www/html/.well-known/acme-challenge
#   sudo certbot certonly --webroot -w /var/www/html -d link4deal.com -d www.link4deal.com
# Si sigue fallando: hay otro sitio en sites-enabled sirviendo link4deal.com — quítalo o unifica.

upstream link4deal_node {
    server 127.0.0.1:5001;
    keepalive 32;
}

# HTTP por dominio (evita fusión rara con otros vhosts). ACME debe servir ficheros, no el SPA.
server {
    listen 80;
    server_name damecodigo.com www.damecodigo.com;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name link4deal.com www.link4deal.com;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name damecodigo.com www.damecodigo.com;

    ssl_certificate     /etc/letsencrypt/live/damecodigo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damecodigo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/link4deal-app.conf;
}

# Si aún no existe /etc/letsencrypt/live/link4deal.com/: comenta TEMPORALMENTE este bloque
# 443, nginx -t && reload, emite el cert con certbot --webroot en :80, luego descomenta.
server {
    listen 443 ssl;
    server_name link4deal.com www.link4deal.com;

    ssl_certificate     /etc/letsencrypt/live/link4deal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/link4deal.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/link4deal-app.conf;
}
